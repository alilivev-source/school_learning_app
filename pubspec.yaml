name: rawdat_al_noor
description: تطبيق روضة النور - تعليم القراءة والكتابة للأطفال
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # إدارة الحالة
  provider: ^6.1.1

  # التخزين المحلي
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # النطق الآلي
  flutter_tts: ^3.8.3

  # تشغيل الصوت
  audioplayers: ^6.0.0

  # الرسوميات
  flutter_svg: ^2.0.10
  lottie: ^3.1.0

  # التصميم
  flutter_animate: ^4.5.0

  # الإشعارات
  flutter_local_notifications: ^17.0.0

  # أدوات
  intl: ^0.19.0
  connectivity_plus: ^6.0.0
  permission_handler: ^11.0.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/json/
    - assets/sounds/
    - assets/svg/
    - assets/svg/letters/
    - assets/svg/letters/arabic/
    - assets/svg/letters/english/
    - assets/svg/words/
    - assets/svg/characters/
    - assets/lottie/
    - assets/fonts/
    - assets/icon/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFF6E9"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21